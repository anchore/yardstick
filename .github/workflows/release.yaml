name: "Release"

permissions: {}

# there should never be two releases in progress at the same time
concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: tag the latest commit on main with the given version (prefixed with v)
        required: true
      skip-checks:
        description: skip pre-release checks (check-gate)
        type: boolean
        default: false

jobs:
  version-available:
    uses: anchore/workflows/.github/workflows/check-version-available.yaml@b3e328b5ae31ba96297e2ed9a6124e5e6352a4c5 # v0.7.0
    permissions:
      contents: read # for the latest tags
    with:
      version: ${{ github.event.inputs.version }}

  check-gate:
    if: ${{ !inputs.skip-checks }}
    permissions:
      contents: read # required for the reusable workflow to check out the repo
      checks: read # required for getting the status of specific check names
    uses: anchore/workflows/.github/workflows/check-gate.yaml@b0c30a80409130d329aaa356fd64a34d8c0b3375 # v0.7.2
    with:
      # these are checks that should be run on pull-request and merges to main.
      # we do NOT want to kick off a release if these have not been verified on main.
      # Please see the validations.yaml workflow for the names that should be used here.
      checks: '["validations"]'

  tag:
    needs: [check-gate, version-available]
    # run even when check-gate is skipped, but never when version-available
    # failed/was skipped, nor when check-gate failed or was cancelled. note:
    # always() disables the implicit success() gate on ALL needs, so the
    # version-available requirement must be re-asserted explicitly here.
    if: >-
      ${{ always()
          && needs.version-available.result == 'success'
          && !contains(fromJSON('["failure", "cancelled"]'), needs.check-gate.result) }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          # in order to properly resolve the version from git
          fetch-depth: 0
          persist-credentials: true
          # for pushing tags (does not inherit workflow permissions)
          token: ${{ secrets.TAG_TOKEN }}

      - name: Tag release
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          git config --global user.name "anchoreci"
          git config --global user.email "anchoreci@users.noreply.github.com"
          git tag "$VERSION_INPUT"
          git push origin --tags

  release-pypi:
    needs:
      - tag
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: read
      # required to authenticate with PyPI via OIDC token
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          # in order to properly resolve the version from git
          fetch-depth: 0
          persist-credentials: false

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      # note: authentication is via the OIDC token
      - name: Publish to PyPI
        run: make ci-publish-pypi

  release-github:
    needs:
      - tag
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          # in order to properly resolve the version from git
          fetch-depth: 0
          persist-credentials: false

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Create github release
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make changelog
          gh release create "$VERSION_INPUT" -F CHANGELOG.md -t "$VERSION_INPUT"
